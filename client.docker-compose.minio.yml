services:
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "minioadmin" # Change this to a secure username
      MINIO_ROOT_PASSWORD: "minioadmin" # Change this to a secure password
    volumes:
      - /opt/minio/data:/data
      - /opt/minio/config:/root/.minio^
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
